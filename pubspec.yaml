
name: daftar_alhesabat
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  uuid: ^4.2.1
  # State Management
  provider: ^6.0.5
  # Local Storage
  hive: ^2.2.3
