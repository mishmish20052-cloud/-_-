name: فك ضغط ملف ZIP

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  unzip-job:
    runs-on: ubuntu-latest

    steps:
    - name: جلب الكود من المستودع
      uses: actions/checkout@v4

    - name: فك ضغط الملف
      uses: ihiroky/extract-action@v1
      with:
        file_path: '*.zip'
        extract_dir: './'
      
    - name: حذف ملف ZIP
      run: rm -f *.zip

    - name: حفظ التغييرات وإرسالها
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "تم فك ضغط ملف ZIP وإضافة الملفات" || echo "لا توجد تغييرات جديدة"
        git push
